name: viggo-backend

services:
  mongo-db:
    image: mongo:7.0
    container_name: viggo-mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
    ports:
      - "27017:27017"
    volumes:
      - ./mongo:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    container_name: viggo-backend
    image: ${BACKEND_IMAGE:-viggo-server-app-refacto:local}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_ENV: ${APP_ENV:-prod}
      secrets:
        - backend_env
    restart: unless-stopped
    depends_on:
      mongo-db:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-prod}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./public/uploads:/project/public/uploads
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:8080/api/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

secrets:
  backend_env:
    file: ${BACKEND_ENV_FILE:-.env.dev}
